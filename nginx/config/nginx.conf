# Define an upstream for the backend service.
upstream fastapi_backend {
    # 'demo-app' is the service name in backend-compose.yml
    server demo-app:1337;
}

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name localhost;
    
    # Security: Hide Nginx version
    server_tokens off;

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main server block for handling HTTPS traffic.
server {
    listen 443 ssl;
    http2 on; # Modern syntax for HTTP/2 (Nginx 1.25.1+)
    server_name localhost;
    
    # Security: Hide Nginx version
    server_tokens off;

    # SSL configuration pointing to self-signed certs generated in Dockerfile
    ssl_certificate /etc/nginx/ssl/self-signed.crt;
    ssl_certificate_key /etc/nginx/ssl/self-signed.key;
    
    # Best practice SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ===== SECURITY HEADERS =====
    # Force HTTPS and protect against common attacks
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===== PERFORMANCE: GZIP =====
    # Compress JSON and static assets for faster delivery
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ===== LIMITS =====
    # Prevent DOS attacks and large payload errors
    client_max_body_size 10M; 

    # Location block for serving static files
    location /static/ {
        alias /var/www/static/;
        expires max;    # Cache forever (best practice for static assets with fingerprinting)
        access_log off; # Reduce disk I/O
    }

    # Main location block to proxy requests to the FastAPI application.
    location / {
        proxy_pass http://fastapi_backend;

        # Set headers to pass client information to the backend application.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}