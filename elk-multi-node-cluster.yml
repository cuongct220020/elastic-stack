name: elastic-stack

services:
  # Setup — generate TLS certs & set built-in user passwords (runs once)
  elastic-setup:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: elasticsearch-custom:${STACK_VERSION}
    container_name: elastic-setup
    hostname: elastic-setup
    user: "0"
    networks:
      - elastic-net
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    command: >
      bash -c '
        if [ x${ELASTIC_PASSWORD} == x ]; then
          echo "Set the ELASTIC_PASSWORD environment variable in the .env file";
          exit 1;
        elif [ x${KIBANA_PASSWORD} == x ]; then
          echo "Set the KIBANA_PASSWORD environment variable in the .env file";
          exit 1;
        fi;
        if [ ! -f config/certs/ca.zip ]; then
          echo "Creating CA";
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip config/certs/ca.zip -d config/certs;
        fi;
        if [ ! -f config/certs/certs.zip ]; then
          echo "Creating certs";
          echo -ne \
          "instances:\n"\
          "  - name: es-01\n"\
          "    dns:\n"\
          "      - es-01\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          "  - name: es-02\n"\
          "    dns:\n"\
          "      - es-02\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          "  - name: es-03\n"\
          "    dns:\n"\
          "      - es-03\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          "  - name: kibana\n"\
          "    dns:\n"\
          "      - kibana\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          "  - name: fleet-server\n"\
          "    dns:\n"\
          "      - fleet-server\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          "  - name: minio\n"\
          "    dns:\n"\
          "      - minio\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          "  - name: logstash\n"\
          "    dns:\n"\
          "      - logstash\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip config/certs/certs.zip -d config/certs;
        fi;
        echo "Setting file permissions";
        chown -R root:root config/certs;
        find . -type d -exec chmod 750 \{\} \;;
        find . -type f -exec chmod 640 \{\} \;;
    
        if ! /usr/share/elasticsearch/jdk/bin/keytool -list \
            -alias elastic-minio-ca \
            -keystore config/certs/elastic-jvm-truststore.jks \
            -storepass changeit -noprompt 2>/dev/null; then
          echo "Building custom JVM truststore with Elastic CA...";
          cp /usr/share/elasticsearch/jdk/lib/security/cacerts /tmp/truststore-tmp.jks;
          /usr/share/elasticsearch/jdk/bin/keytool -importcert \
            -trustcacerts \
            -keystore /tmp/truststore-tmp.jks \
            -storepass changeit \
            -noprompt \
            -alias elastic-minio-ca \
            -file config/certs/ca/ca.crt;
          chmod 644 /tmp/truststore-tmp.jks;
          mv /tmp/truststore-tmp.jks config/certs/elastic-jvm-truststore.jks;
          echo "Truststore ready.";
        else
          echo "Truststore already contains Elastic CA, skipping.";
        fi;
    
        echo "Waiting for Elasticsearch availability";
        until curl -s --cacert config/certs/ca/ca.crt https://es-01:9200 | grep -q "missing authentication credentials"; do sleep 30; done;
        echo "Setting kibana_system password";
        until curl -s -X POST --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://es-01:9200/_security/user/kibana_system/_password -d "{\"password\":\"${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 10; done;
        echo "All done!";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f config/certs/es-01/es-01.crt ] && [ -f config/certs/elastic-jvm-truststore.jks ]"]
      interval: 1s
      timeout: 5s
      retries: 120


  # ELASTICSEARCH — NODE 01 (master-eligible, exposes port)
  es-01:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: elasticsearch-custom:${STACK_VERSION}
    container_name: es-01
    hostname: es-01
    restart: unless-stopped
    depends_on:
      elastic-setup:
        condition: service_healthy
    networks:
      - elastic-net
    ports:
      - "${ES_PORT}:9200"
    environment:
      # Cluster
      - cluster.name=${CLUSTER_NAME}
      - cluster.initial_master_nodes=es-01,es-02,es-03
      - discovery.seed_hosts=es-02,es-03
      - node.name=es-01
      # JVM / memory
      - ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-1g} -Xmx${ES_HEAP_SIZE:-1g} -Djavax.net.ssl.trustStore=/usr/share/elasticsearch/config/certs/elastic-jvm-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit
      - bootstrap.memory_lock=true
      - xpack.ml.use_auto_machine_memory_percent=true
      # Security
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.license.self_generated.type=${LICENSE}
      - xpack.security.enabled=true

      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.certificate=certs/es-01/es-01.crt
      - xpack.security.http.ssl.key=certs/es-01/es-01.key
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt

      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate=certs/es-01/es-01.crt
      - xpack.security.transport.ssl.key=certs/es-01/es-01.key
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      # Timezone
      - TZ=Asia/Ho_Chi_Minh
      - LOG_LEVEL=warn
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es-data-01:/usr/share/elasticsearch/data
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf --cacert config/certs/ca/ca.crt -u elastic:${ELASTIC_PASSWORD} https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: ${ES_MEM_LIMIT:-2g}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ELASTICSEARCH — NODE 02
  es-02:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: elasticsearch-custom:${STACK_VERSION}
    container_name: es-02
    hostname: es-02
    restart: unless-stopped
    depends_on:
      elastic-setup:
        condition: service_healthy
    networks:
      - elastic-net
    environment:
      # Cluster
      - cluster.name=${CLUSTER_NAME}
      - cluster.initial_master_nodes=es-01,es-02,es-03
      - discovery.seed_hosts=es-01,es-03
      - node.name=es-02
      # JVM / memory
      - ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-1g} -Xmx${ES_HEAP_SIZE:-1g} -Djavax.net.ssl.trustStore=/usr/share/elasticsearch/config/certs/elastic-jvm-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit
      - bootstrap.memory_lock=true
      - xpack.ml.use_auto_machine_memory_percent=true
      # Security
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.license.self_generated.type=${LICENSE}
      - xpack.security.enabled=true

      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.certificate=certs/es-02/es-02.crt
      - xpack.security.http.ssl.key=certs/es-02/es-02.key
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt

      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate=certs/es-02/es-02.crt
      - xpack.security.transport.ssl.key=certs/es-02/es-02.key
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      # Timezone
      - TZ=Asia/Ho_Chi_Minh
      - LOG_LEVEL=warn
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es-data-02:/usr/share/elasticsearch/data
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf --cacert config/certs/ca/ca.crt -u elastic:${ELASTIC_PASSWORD} https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: ${ES_MEM_LIMIT:-2g}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ELASTICSEARCH - NODE 3
  es-03:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: elasticsearch-custom:${STACK_VERSION}
    container_name: es-03
    hostname: es-03
    restart: unless-stopped
    depends_on:
      elastic-setup:
        condition: service_healthy
    networks:
      - elastic-net
    environment:
      # Cluster
      - cluster.name=${CLUSTER_NAME}
      - cluster.initial_master_nodes=es-01,es-02,es-03
      - discovery.seed_hosts=es-01,es-02
      - node.name=es-03
      # JVM / memory
      - ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-1g} -Xmx${ES_HEAP_SIZE:-1g} -Djavax.net.ssl.trustStore=/usr/share/elasticsearch/config/certs/elastic-jvm-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit
      - bootstrap.memory_lock=true
      - xpack.ml.use_auto_machine_memory_percent=true
      # Security
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.license.self_generated.type=${LICENSE}
      - xpack.security.enabled=true

      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.certificate=certs/es-03/es-03.crt
      - xpack.security.http.ssl.key=certs/es-03/es-03.key
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt

      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate=certs/es-03/es-03.crt
      - xpack.security.transport.ssl.key=certs/es-03/es-03.key
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      # Timezone
      - TZ=Asia/Ho_Chi_Minh
      - LOG_LEVEL=warn
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es-data-03:/usr/share/elasticsearch/data
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf --cacert config/certs/ca/ca.crt -u elastic:${ELASTIC_PASSWORD} https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: ${ES_MEM_LIMIT:-2g}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  # KIBANA DASHBOARD
  kibana:
    build:
      context: ./kibana
      dockerfile: Dockerfile
    image: kibana-custom:${STACK_VERSION}
    container_name: kibana
    hostname: kibana
    restart: unless-stopped
    depends_on:
      es-01:
        condition: service_healthy
      es-02:
        condition: service_healthy
      es-03:
        condition: service_healthy
    networks:
      - elastic-net
    ports:
      - "${KIBANA_PORT}:5601"
    environment:
      # Elasticsearch
      - ELASTICSEARCH_HOSTS=["https://es-01:9200","https://es-02:9200","https://es-03:9200"]
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      # Server
      - SERVER_NAME=kibana
      # Encryption keys
      - KIBANA_ENCRYPTION_KEY=${KIBANA_ENCRYPTION_KEY}
      - KIBANA_REPORTING_KEY=${KIBANA_REPORTING_KEY}
      - KIBANA_SECURITY_KEY=${KIBANA_SECURITY_KEY}
      # HTTPS cho Kibana server
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=config/certs/kibana/kibana.crt
      - SERVER_SSL_KEY=config/certs/kibana/kibana.key
      # Node.js memory limit (prevent V8 from thrashing GC when close to 1g container limit)
      - NODE_OPTIONS=--max-old-space-size=800
      # Timezone
      - TZ=Asia/Ho_Chi_Minh
      - LOG_LEVEL=warn
    volumes:
      - certs:/usr/share/kibana/config/certs
      - kibana-data:/usr/share/kibana/data
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf --cacert config/certs/ca/ca.crt https://localhost:5601/api/status | grep -q '\"overall\":{\"level\":\"available\"' || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 150s
    deploy:
      resources:
        limits:
          memory: ${KIBANA_MEM_LIMIT:-1g}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # LOGSTASH
  logstash:
    build:
      context: logstash
      dockerfile: logstash/Dockerfile
    image: logstash-custom:${STACK_VERSION}
    container_name: logstash
    hostname: logstash
    profiles: [ logstash ]
    restart: unless-stopped
    depends_on:
      es-01:
        condition: service_healthy
      es-02:
        condition: service_healthy
      es-03:
        condition: service_healthy
    networks:
      - elastic-net
    ports:
      - "${LOGSTASH_BEATS_PORT:-5044}:5044"
      - "${LOGSTASH_TCP_PORT:-5000}:5000/tcp"
      - "${LOGSTASH_UDP_PORT:-5000}:5000/udp"
      - "${LOGSTASH_API_PORT:-9600}:9600"
    environment:
      # Elasticsearch — HTTPS + load balance across all 3 nodes
      - ELASTICSEARCH_HOSTS=https://es-01:9200,https://es-02:9200,https://es-03:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATE_AUTHORITY=/usr/share/logstash/config/certs/ca/ca.crt
      - ELASTICSEARCH_SSL_ENABLED=true
      
      # Logstash Inbound TLS (Ready for Beats/Agent SSL)
      - LOGSTASH_SSL_CERTIFICATE=/usr/share/logstash/config/certs/logstash/logstash.crt
      - LOGSTASH_SSL_KEY=/usr/share/logstash/config/certs/logstash/logstash.key

      # JVM — tune to container memory (512m heap for 1g limit)
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
      # Node
      - NODE_NAME=logstash
      # Pipeline — scale workers to available CPUs
      - PIPELINE_WORKERS=${LOGSTASH_PIPELINE_WORKERS:-2}
      - PIPELINE_BATCH_SIZE=${LOGSTASH_PIPELINE_BATCH_SIZE:-250}
      - PIPELINE_BATCH_DELAY=${LOGSTASH_PIPELINE_BATCH_DELAY:-50}
      # Misc
      - LOG_LEVEL=warn
      - TZ=Asia/Ho_Chi_Minh
      - XPACK_MONITORING_ENABLED=false
    volumes:
      - certs:/usr/share/logstash/config/certs:ro        # TLS CA cert
      - logstash-data:/usr/share/logstash/data
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9600/_node/stats > /dev/null || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 768m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


networks:
  elastic-net:
    name: elastic-net
    driver: bridge


volumes:
  certs:
    name: certs
    driver: local
  es-data-01:
    name: es-data-01
    driver: local
  es-data-02:
    name: es-data-02
    driver: local
  es-data-03:
    name: es-data-03
    driver: local
  kibana-data:
    name: kibana-data
    driver: local
  logstash-data:
    name: logstash-data
    driver: local