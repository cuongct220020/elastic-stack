name: storage-compose

services:
  # MinIO Server (S3-compatible Object Storage for Cold/Frozen data)
  # Uses Single-Node Multi-Drive (SNMD) to enable Erasure Coding for high availability.
  # TLS/HTTPS is enabled using the shared Elastic CA certificates.
  minio:
    image: quay.io/minio/minio:${MINIO_VERSION:-RELEASE.2024-03-05T04-48-44Z}
    hostname: minio
    container_name: minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"  # S3 API Port (HTTPS)
      - "${MINIO_WEBUI_PORT:-9001}:9001"  # Web Console Port (HTTPS)
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
      # Required to trust the Elastic self-signed CA
      - MINIO_SERVER_URL=https://minio:9000
    command: server /data1 /data2 /data3 /data4 --console-address ":9001"
    volumes:
      - minio-data1:/data1
      - minio-data2:/data2
      - minio-data3:/data3
      - minio-data4:/data4
      # Mount shared Elastic certs. MinIO automatically enables HTTPS if
      # public.crt and private.key exist in ~/.minio/certs/
      - certs:/usr/share/elastic-certs:ro
    # Copy the dedicated MinIO certs (generated by elastic-setup) to MinIO's expected TLS directory before starting
    entrypoint: >
      /bin/sh -c "
      mkdir -p /root/.minio/certs/CAs;
      cp /usr/share/elastic-certs/minio/minio.crt /root/.minio/certs/public.crt;
      cp /usr/share/elastic-certs/minio/minio.key /root/.minio/certs/private.key;
      cp /usr/share/elastic-certs/ca/ca.crt /root/.minio/certs/CAs/public.crt;
      exec minio server /data1 /data2 /data3 /data4 --console-address ':9001'
      "
    networks:
      - elastic-net
    healthcheck:
      # Use https and ignore cert validation for healthcheck
      test: ["CMD", "curl", "-f", "-k", "https://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  # MinIO Client (MC) - Automated bootstrap script
  # Waits for MinIO to start, authenticates via HTTPS, and creates the snapshot bucket.
  minio-mc:
    image: quay.io/minio/minio:${MINIO_VERSION:-RELEASE.2024-03-05T04-48-44Z}
    hostname: minio-mc
    container_name: minio-mc
    profiles: ["minio-mc"]
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - elastic-net
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO HTTPS to be ready...';
      sleep 5;
      
      # --insecure is used because we are connecting via self-signed internal certs
      /usr/bin/mc alias set myminio https://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-minioadmin123} --insecure;
      
      echo 'Creating Elasticsearch snapshot bucket...';
      /usr/bin/mc mb myminio/es-snapshots-bucket --ignore-existing --insecure;
      
      echo 'Setting bucket policy to allow internal access...';
      /usr/bin/mc anonymous set private myminio/es-snapshots-bucket --insecure;
      
      echo 'MinIO TLS setup and bucket creation completed!';
      "


networks:
  elastic-net:
    name: elastic-net
    external: true


volumes:
  certs:
    name: certs
    external: true
  minio-data1:
    name: minio-data1
    driver: local
  minio-data2:
    name: minio-data2
    driver: local
  minio-data3:
    name: minio-data3
    driver: local
  minio-data4:
    name: minio-data4
    driver: local