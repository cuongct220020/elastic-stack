name: simple-elastic-stack

# =============================================================================
# PRODUCTION ELASTIC STACK
# Topology: 1x Elasticsearch | 1x Kibana | 1x Fleet Server | n×Elastic Agent
#
# Prerequisites:
#   - Copy .env.example → .env and fill in all required values
#   - Run:  sysctl -w vm.max_map_count=262144  (or persist in /etc/sysctl.conf)
#   - TLS certs are auto-generated by the `setup` service on first boot
#
# Scale agents:  docker compose up -d --scale elastic-agent=3
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # SETUP — runs once to generate TLS certs and set internal passwords
  # ---------------------------------------------------------------------------
  setup:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: elasticsearch-custom:${STACK_VERSION}
    container_name: es-setup
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    user: "0"
    networks:
      - elastic-net
    command: >
      bash -c '
        set -e

        # Validate required env vars
        [ -z "${ELASTIC_PASSWORD}" ]  && echo "ERROR: ELASTIC_PASSWORD not set"  && exit 1
        [ -z "${KIBANA_PASSWORD}" ]   && echo "ERROR: KIBANA_PASSWORD not set"   && exit 1
        [ -z "${FLEET_SERVER_SERVICE_TOKEN}" ] && echo "ERROR: FLEET_SERVER_SERVICE_TOKEN not set" && exit 1

        # Generate CA
        if [ ! -f config/certs/ca/ca.crt ]; then
          echo ">>> Generating CA..."
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip
          unzip -q config/certs/ca.zip -d config/certs
        fi

        # Generate node + fleet-server certs
        if [ ! -f config/certs/elasticsearch/elasticsearch.crt ]; then
          echo ">>> Generating node certificates..."
          cat > config/certs/instances.yml <<EOF
        instances:
          - name: elasticsearch
            dns: [elasticsearch, localhost]
            ip:  [127.0.0.1]
          - name: kibana
            dns: [kibana, localhost]
            ip:  [127.0.0.1]
          - name: fleet-server
            dns: [fleet-server, localhost]
            ip:  [127.0.0.1]
        EOF
          bin/elasticsearch-certutil cert --silent --pem \
            -out config/certs/certs.zip \
            --in  config/certs/instances.yml \
            --ca-cert config/certs/ca/ca.crt \
            --ca-key  config/certs/ca/ca.key
          unzip -q config/certs/certs.zip -d config/certs
        fi

        echo ">>> Setting permissions..."
        chown -R root:root config/certs
        find config/certs -type d -exec chmod 750 {} \;
        find config/certs -type f -exec chmod 640 {} \;

        echo ">>> Waiting for Elasticsearch..."
        until curl -sf --cacert config/certs/ca/ca.crt \
            https://elasticsearch:9200 | grep -q "missing authentication credentials"; do
          sleep 10
        done

        echo ">>> Setting kibana_system password..."
        until curl -sf -X POST \
            --cacert config/certs/ca/ca.crt \
            -u "elastic:${ELASTIC_PASSWORD}" \
            -H "Content-Type: application/json" \
            https://elasticsearch:9200/_security/user/kibana_system/_password \
            -d "{\"password\":\"${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do
          sleep 5
        done

        echo ">>> All done!"
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f config/certs/fleet-server/fleet-server.crt ]"]
      interval: 5s
      timeout: 5s
      retries: 60

  # ---------------------------------------------------------------------------
  # ELASTICSEARCH — single data + master node
  # ---------------------------------------------------------------------------
  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: elasticsearch-custom:${STACK_VERSION}
    container_name: elasticsearch
    hostname: elasticsearch
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_healthy
    networks:
      - elastic-net
    ports:
      - "127.0.0.1:9200:9200"   # bind to loopback only; expose via reverse-proxy in prod
    environment:
      # --- Cluster (single-node mode) ---
      - cluster.name=${CLUSTER_NAME}
      - node.name=elasticsearch
      - discovery.type=single-node
      # --- JVM / memory ---
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-1g} -Xmx${ES_HEAP_SIZE:-1g}
      - xpack.ml.use_auto_machine_memory_percent=false
      # --- Security ---
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.license.self_generated.type=${LICENSE:-basic}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.http.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.transport.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es-data:/usr/share/elasticsearch/data
      - es-logs:/usr/share/elasticsearch/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          curl -sf --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q "missing authentication credentials"
        ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: ${ES_MEM_LIMIT:-2g}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # KIBANA
  # ---------------------------------------------------------------------------
  kibana:
    build:
      context: ./kibana
      dockerfile: Dockerfile
    image: kibana-custom:${STACK_VERSION}
    container_name: kibana
    hostname: kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elastic-net
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      # Fleet / APM integration
      - XPACK_FLEET_AGENTS_ELASTICSEARCH_HOSTS=["https://elasticsearch:9200"]
      - XPACK_FLEET_AGENTS_FLEET_SERVER_HOSTS=["https://fleet-server:8220"]
      - XPACK_FLEET_SSL_CERTIFICATE_AUTHORITIES=/usr/share/kibana/config/certs/ca/ca.crt
      # Encryption keys (set unique random strings in .env)
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_REPORTING_KEY}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_SECURITY_KEY}
    volumes:
      - certs:/usr/share/kibana/config/certs
      - kibana-data:/usr/share/kibana/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:5601/api/status | grep -q '\"overall\":{\"level\":\"available\"'"
        ]
      interval: 15s
      timeout: 15s
      retries: 60
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${KIBANA_MEM_LIMIT:-1g}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # FLEET SERVER
  # ---------------------------------------------------------------------------
  fleet-server:
    image: docker.elastic.co/beats/elastic-agent:${STACK_VERSION}
    container_name: fleet-server
    hostname: fleet-server
    restart: unless-stopped
    depends_on:
      kibana:
        condition: service_healthy
    networks:
      - elastic-net
    ports:
      - "8220:8220"   # Fleet enrollment endpoint
    user: root        # Required for fleet-server mode
    environment:
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=https://elasticsearch:9200
      - FLEET_SERVER_ELASTICSEARCH_CA=/certs/ca/ca.crt
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_SERVICE_TOKEN}
      - FLEET_SERVER_CERT=/certs/fleet-server/fleet-server.crt
      - FLEET_SERVER_CERT_KEY=/certs/fleet-server/fleet-server.key
      - FLEET_SERVER_PORT=8220
      - FLEET_SERVER_POLICY_ID=${FLEET_SERVER_POLICY_ID:-fleet-server-policy}
      - ELASTICSEARCH_CA=/certs/ca/ca.crt
      - KIBANA_FLEET_HOST=https://kibana:5601
      - KIBANA_FLEET_USERNAME=elastic
      - KIBANA_FLEET_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - certs:/certs:ro
      - fleet-data:/usr/share/elastic-agent/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          curl -sf --cacert /certs/ca/ca.crt https://localhost:8220/api/status | grep -q "HEALTHY"
        ]
      interval: 15s
      timeout: 15s
      retries: 60
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${FLEET_MEM_LIMIT:-512m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # ELASTIC AGENT  (scale with: docker compose up -d --scale elastic-agent=N)
  # ---------------------------------------------------------------------------
  elastic-agent:
    image: docker.elastic.co/beats/elastic-agent:${STACK_VERSION}
    # No container_name — required to allow multiple replicas via --scale
    restart: unless-stopped
    depends_on:
      fleet-server:
        condition: service_healthy
    networks:
      - elastic-net
    user: root
    environment:
      - FLEET_ENROLL=true
      - FLEET_URL=https://fleet-server:8220
      - FLEET_ENROLLMENT_TOKEN=${ELASTIC_AGENT_ENROLLMENT_TOKEN}
      - FLEET_CA=/certs/ca/ca.crt
      - ELASTICSEARCH_CA=/certs/ca/ca.crt
    volumes:
      - certs:/certs:ro
      # Mount host paths for system/log collection (adjust as needed)
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: ${AGENT_MEM_LIMIT:-256m}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"


networks:
  elastic-net:
    name: elastic-net
    driver: bridge


volumes:
  certs:
    name: elastic-certs
    driver: local
  es-data:
    name: es-data
    driver: local
  es-logs:
    name: es-logs
    driver: local
  kibana-data:
    name: kibana-data
    driver: local
  fleet-data:
    name: fleet-data
    driver: local