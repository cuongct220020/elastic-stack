name: backend-compose

services:
  demo-app:
    build:
      context: ./demo-app
      dockerfile: Dockerfile
    container_name: demo-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      backend-network:
        # Alias này rất quan trọng để khớp với 'server app:1337;' trong nginx.conf của bạn
        aliases:
          - app
    environment:
      - MONGO_URI=mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-example}@mongodb:27017/
      # Thêm các biến môi trường khác nếu ứng dụng cần
    volumes:
      - ./demo-app:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:6-jammy
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}
    volumes:
      - mongodb_data:/data/db
    networks:
      - backend-network
    healthcheck:
      # Đảm bảo MongoDB đã khởi động và sẵn sàng nhận kết nối
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    # Nếu file nginx/Dockerfile trống, bạn có thể uncomment dòng image dưới đây và comment phần build
    # image: nginx:alpine
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - demo-app
    networks:
      - backend-network
    volumes:
      # Mount cấu hình Nginx vào conf.d (Read-only)
      - ./nginx/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Volumes hỗ trợ Let's Encrypt dựa trên nginx.conf của bạn
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend-network:
    driver: bridge

volumes:
  mongodb_data:
  certbot_www:
  certbot_certs:
