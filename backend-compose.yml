name: backend-compose

services:
  demo-app:
    build:
      context: ./demo-app
      dockerfile: Dockerfile
    image: demo-app:${APP_VERSION:-latest}
    # Remove container_name to allow scaling with --scale demo-app=3
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend-net
      - elastic-net
    environment:
      - MONGO_DB_PORT=${MONGO_DB_PORT:-27017}
      - MONGO_DB_HOST=${MONGO_DB_HOST:-mongodb}
      - MONGO_DB_USERNAME=${MONGO_DB_USERNAME:-root}
      - MONGO_DB_PASSWORD=${MONGO_DB_PASSWORD:-example}
      - MONGO_DB_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@${MONGO_DB_HOST}:${MONGO_DB_PORT}/
      - MONGO_DB_NAME=${MONGO_DB_NAME:-demo}
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./demo-app:/app
      - app-logs:/var/log/demo-app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:1337/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MONGO DB
  mongodb:
    image: mongo:${MONGO_DB_VERSION:-7.0}
    hostname: mongodb
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DB_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DB_PASSWORD:-example}
    volumes:
      - mongodb-data:/data/db
    networks:
      - backend-net
      - elastic-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # NGINX REVERSE PROXY
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: nginx-custom:${NGINX_VERSION:-1.25}
    hostname: nginx
    container_name: nginx
    restart: unless-stopped
    environment:
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      demo-app:
        condition: service_healthy
    networks:
      - backend-net
      - elastic-net
    volumes:
      - ./nginx/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  backend-net:
    name: backend-net
    driver: bridge
  elastic-net:
    name: elastic-net
    external: true

volumes:
  app-logs:
    name: app-logs
    external: true
  mongodb-data:
    name: mongodb-data
    driver: local
