name: backend-compose

services:
  demo-app:
    build:
      context: ./demo-app
      dockerfile: Dockerfile
    hostname: demo-app
    container_name: demo-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend-net
    environment:
      - MONGO_URI=mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-example}@mongodb:27017/
    volumes:
      - ./demo-app:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MONGO DB
  mongodb:
    image: mongo:6-jammy
    hostname: mongodb
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}
    volumes:
      - mongodb-data:/data/db
    networks:
      - backend-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g


  # NGINX REVERSE PROXY
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - demo-app
    networks:
      - backend-net
    volumes:
      - ./nginx/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m


networks:
  backend-net:
    name: backend-net
    driver: bridge


volumes:
  mongodb-data:
    name: mongodb-data
    driver: local
  certbot-www:
    name: certbot-www
    driver: local
  certbot-certs:
    name: certbot-certs
    driver: local
