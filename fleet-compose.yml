name: elastic-fleet

services:
  # FLEET SERVER
  fleet-server:
    build:
      context: ./beats/fleet
      dockerfile: Dockerfile
    image: fleet-server-custom:${STACK_VERSION}
    container_name: fleet-server
    hostname: fleet-server
    restart: unless-stopped
    networks:
      - elastic-net
    ports:
      - "${FLEET_SERVER_PORT:-8220}:8220"  # Fleet enrollment endpoint
    user: root # Required for fleet-server mode
    environment:
      - FLEET_SERVER_ENABLE=1
      - FLEET_SERVER_PORT=8220
      - FLEET_URL=https://fleet-server:8220
      - FLEET_SERVER_POLICY_ID=${FLEET_SERVER_POLICY_ID:-fleet-server-policy}
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_SERVICE_TOKEN}
      # Elasticsearch connectivity
      - FLEET_SERVER_ELASTICSEARCH_HOST=https://es-01:9200
      - FLEET_SERVER_ELASTICSEARCH_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt
      - ELASTICSEARCH_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt
      # Fleet Server TLS
      - FLEET_SERVER_CERT=/usr/share/elastic-agent/config/certs/fleet-server/fleet-server.crt
      - FLEET_SERVER_CERT_KEY=/usr/share/elastic-agent/config/certs/fleet-server/fleet-server.key
      # Kibana connectivity
      - KIBANA_FLEET_HOST=https://kibana:5601
      - KIBANA_FLEET_USERNAME=elastic
      - KIBANA_FLEET_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_FLEET_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt
      # Timezone
      - TZ=Asia/Ho_Chi_Minh
      - ELASTIC_AGENT_LOG_LEVEL=error
    volumes:
      - certs:/usr/share/elastic-agent/config/certs:ro
      - fleet-data:/usr/share/elastic-agent/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          curl -sf --cacert /usr/share/elastic-agent/config/certs/ca/ca.crt https://localhost:8220/api/status | grep -q "HEALTHY"
        ]
      interval: 15s
      timeout: 15s
      retries: 60
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${FLEET_MEM_LIMIT:-512m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"


  # ELASTIC AGENT  (scale with: docker compose -f fleet-compose.yml up -d --scale elastic-agent=N)
  elastic-agent:
    build:
      context: ./beats/agent
      dockerfile: Dockerfile
    image: elastic-agent-custom:${STACK_VERSION}
    # No container_name — required to allow multiple replicas via --scale
    restart: unless-stopped
    depends_on:
      fleet-server:
        condition: service_healthy
    networks:
      - elastic-net
    user: root
    environment:
      - FLEET_ENROLL=1
      - FLEET_URL=https://fleet-server:8220
      - FLEET_ENROLLMENT_TOKEN=${ELASTIC_AGENT_ENROLLMENT_TOKEN}
      - FLEET_SERVER_CERT_AUTH=/usr/share/elastic-agent/config/certs/ca/ca.crt  # FLEET_CA → FLEET_SERVER_CERT_AUTH
      - ELASTICSEARCH_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt
      # MISC
      - TZ=Asia/Ho_Chi_Minh
      - ELASTIC_AGENT_LOG_LEVEL=error
    volumes:
      - certs:/usr/share/elastic-agent/config/certs:ro
      # Mount host paths for system/log collection (adjust as needed)
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: ${AGENT_MEM_LIMIT:-256m}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"


networks:
  elastic-net:
    name: elastic-net
    external: true


volumes:
  certs:
    name: certs
    external: true
  fleet-data:
    name: fleet-data
    driver: local